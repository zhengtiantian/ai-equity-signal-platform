services:
  # ======================================================
  # 1. Databases and infrastructure
  # ======================================================
  mysql:
    image: mysql:8.0
    container_name: mysql8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workflow
    ports:
      - "23306:3306"
    volumes:
      - /Volumes/Data4T/docker-volumes/mysql_data:/var/lib/mysql
    networks:
      - project-net

  mongodb:
    image: mongo:6.0
    container_name: mongo6
    restart: always
    command: --wiredTigerCacheSizeGB 1
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "37018:27017"
    volumes:
      - /Volumes/Data4T/docker-volumes/mongo_data:/data/db
    networks:
      - project-net

  # ======================================================
  # 2. Keycloak identity and access management
  # ======================================================
  keycloak:
    image: xiz001/quant_keycloak:c74db2b
    container_name: quant_keycloak
    restart: always
    ports:
      - "18082:8080"
    environment:
      - KC_DB=mysql
      - KC_DB_URL=jdbc:mysql://mysql8:3306/keycloak?useSSL=false&allowPublicKeyRetrieval=true
      - KC_DB_USERNAME=root
      - KC_DB_PASSWORD=root
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ../quant_keycloak/quant-realm.json:/opt/keycloak/data/import/quant-realm.json:ro
    depends_on:
      - mysql
    networks:
      - project-net

  # ======================================================
  # 3. Quant platform
  # ======================================================
  quant_api:
    image: xiz001/quant_api:d31c511
    container_name: quant_api
    restart: always
    ports:
      - "18081:8081"
    depends_on:
      - mysql
      - mongodb
      - keycloak
    networks:
      - project-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  quant_ui:
    image: xiz001/quant_ui:4e32b96
    container_name: quant_ui
    restart: always
    ports:
      - "18080:80"
    depends_on:
      - quant_api
    networks:
      - project-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  quant_data:
    image: xiz001/quant_data:17d4ddc
    container_name: quant_data
    restart: always
    environment:
      - OLLAMA_MODEL=qwen3:4b-q4_K_M
      - OLLAMA_API=http://host.docker.internal:11434
    depends_on:
      - quant_api
    networks:
      - project-net
    volumes:
      - ./quant_data/scripts:/app/scripts
      - /Volumes/Data4T/docker-volumes/gdelt_cache:/Volumes/Data4T/docker-volumes/gdelt_cache
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ======================================================
  # 4. MLflow experiment tracking
  # ======================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: mlflow
    restart: always
    ports:
      - "15050:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlruns.db
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - /Volumes/Data4T/docker-volumes/mlflow_data:/mlflow
    networks:
      - project-net

  # ======================================================
  # 5. quant_ai — RAG + Local LLM service (runs as host process; container kept for reference)
  # ======================================================
  quant-ai:
    image: xiz001/quant_ai:e6130ea
    container_name: quant-ai
    restart: always
    ports:
      - "18000:8083"
    environment:
      - LOCAL_MODEL_NAME=qwen3.5-9b-mlx
      - EMBED_MODEL=text-embedding-nomic-embed-text-v1.5
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
      - QUANT_API=http://quant_api:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - quant_api
    networks:
      - project-net

  # ======================================================
  # 6. Kafka message queue
  # ======================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: always
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=4
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qg
    volumes:
      - /Volumes/Data4T/docker-volumes/kafka_data:/var/lib/kafka/data
    networks:
      - project-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    ports:
      - "15070:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=quant
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - project-net

  # ======================================================
  # 7. Airflow task scheduling
  # ======================================================
  airflow-postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - /Volumes/Data4T/docker-volumes/airflow_postgres:/var/lib/postgresql/data
    networks:
      - project-net

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: quant_airflow:local
    container_name: airflow-init
    restart: "no"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      AIRFLOW__WEBSERVER__SECRET_KEY: quant_airflow_secret
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@quant.local || true
      "
    volumes:
      - ../quant_data/airflow/dags:/opt/airflow/dags
      - /Volumes/Data4T/docker-volumes/airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-postgres
    networks:
      - project-net

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: quant_airflow:local
    container_name: airflow-webserver
    restart: always
    environment: *airflow-env
    command: webserver
    ports:
      - "15060:8080"
    volumes:
      - ../quant_data/airflow/dags:/opt/airflow/dags
      - /Volumes/Data4T/docker-volumes/airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - airflow-postgres
    networks:
      - project-net

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: quant_airflow:local
    container_name: airflow-scheduler
    restart: always
    environment: *airflow-env
    command: scheduler
    volumes:
      - ../quant_data/airflow/dags:/opt/airflow/dags
      - /Volumes/Data4T/docker-volumes/airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - airflow-postgres
    networks:
      - project-net

networks:
  project-net:
    driver: bridge
